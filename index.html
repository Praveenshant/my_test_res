<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praveen SB| Data Engineer</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #eef2f3, #dfe9f3);
  padding: 20px;
}

.title {
  text-align: center;
  color: #2c3e50;
}

.container {
  max-width: 800px;
  margin: auto;
}

.card {
  background: white;
  margin: 15px 0;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card h2 {
  margin: 0;
  color: #34495e;
}

.card p {
  color: #555;
}

.skills span {
  display: inline-block;
  background: #3498db;
  color: white;
  padding: 6px 12px;
  margin: 5px;
  border-radius: 20px;
  font-size: 12px;
}
</style>
</head>

<body>

<h1 class="title">Praveen SB- Data Engineer</h1>

<div class="container" id="content"></div>

<script>
// Embedded CSV data
const csvData = `section,title,subtitle,description
profile,Praveen SB,Data Engineer,4+ years experience in Snowflake DBT AWS SQL
experience,Galaxy Data Solutions Pvt Ltd,Qatar Insurance Group (Sep 2024 - Apr 2026),Built scalable pipelines using Snowflake DBT and optimized ELT workflows
experience,Infosys,YOU Broadband (Jun 2022 - Sep 2024),Developed pipelines using Snowflake Airflow AWS and built Power BI dashboards
skills,Technical Skills,,Snowflake|DBT|AWS|Airflow|SQL|Python|Power BI|PostgreSQL
contact,Email,,praveensb205@gmail.com
contact,Phone,,7418423505`;

// Convert CSV → UI
const rows = csvData.split('\n').slice(1);
const container = document.getElementById('content');

rows.forEach(row => {
  const [section, title, subtitle, description] = row.split(',');

  let card = document.createElement('div');
  card.className = 'card';

  if (section === 'skills') {
    let skills = description.split('|')
      .map(skill => `<span>${skill}</span>`)
      .join('');

    card.innerHTML = `<h2>${title}</h2><div class="skills">${skills}</div>`;
  } else {
    card.innerHTML = `
      <h2>${title}</h2>
      <p>${subtitle || ''}</p>
      <p>${description}</p>
    `;
  }

  container.appendChild(card);
});
</script>

</body>
</html>
